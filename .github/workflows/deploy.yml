name: Deploy Cloud Resume


on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest  

    steps:

      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://olerato-cloud-resume/ \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "terraform/*" \
            --exclude "bucket-policy.json" \
            --exclude "cloudfront-config.json" \
            --exclude "lambda-trust-policy.json" \
            --exclude "lambda_function.py" \
            --exclude "lambda_function.zip" \
            --exclude "make_zip.py" \
            --exclude "response.json" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E24IHIG28RVRXW  \
            --paths "/*"